<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" fill="none">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="lg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Hexagon mark -->
  <polygon points="20,4 32,11 32,25 20,32 8,25 8,11" stroke="url(#lg)" stroke-width="1.5" fill="url(#lg2)" filter="url(#glow)"/>
  <!-- Inner circuit nodes -->
  <circle cx="20" cy="11" r="1.5" fill="#00e5ff"/>
  <circle cx="26" cy="18" r="1.5" fill="#a855f7"/>
  <circle cx="20" cy="25" r="1.5" fill="#00e5ff"/>
  <circle cx="14" cy="18" r="1.5" fill="#a855f7"/>
  <line x1="20" y1="11" x2="26" y2="18" stroke="#00e5ff" stroke-width="0.8" stroke-opacity="0.6"/>
  <line x1="26" y1="18" x2="20" y2="25" stroke="#a855f7" stroke-width="0.8" stroke-opacity="0.6"/>
  <line x1="20" y1="25" x2="14" y2="18" stroke="#00e5ff" stroke-width="0.8" stroke-opacity="0.6"/>
  <line x1="14" y1="18" x2="20" y2="11" stroke="#a855f7" stroke-width="0.8" stroke-opacity="0.6"/>
  <!-- Center core -->
  <circle cx="20" cy="18" r="2.5" fill="url(#lg)" opacity="0.9"/>

  <!-- Wordmark -->
  <text x="40" y="22" font-family="ui-sans-serif,system-ui,Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="-0.5" fill="#e6ecff">FORTI</text>
  <text x="79" y="22" font-family="ui-sans-serif,system-ui,Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="-0.5" fill="url(#lg)">RENOVA</text>
</svg>
