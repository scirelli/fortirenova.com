<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="bg-am" cx="50%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#1a2340"/>
      <stop offset="100%" stop-color="#070912"/>
    </radialGradient>
    <linearGradient id="skin-am" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#c8956b"/>
      <stop offset="100%" stop-color="#a0704a"/>
    </linearGradient>
    <linearGradient id="hair-am" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c1a10"/>
      <stop offset="100%" stop-color="#1a0e08"/>
    </linearGradient>
    <linearGradient id="accent-am" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <clipPath id="circle-am">
      <circle cx="100" cy="100" r="100"/>
    </clipPath>
    <filter id="glow-am">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-am)"/>

  <!-- Grid lines background -->
  <g clip-path="url(#circle-am)" opacity="0.15">
    <line x1="0" y1="50"  x2="200" y2="50"  stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="200" y2="100" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="200" y2="150" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="50"  y1="0" x2="50"  y2="200" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="200" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="200" stroke="#00e5ff" stroke-width="0.5"/>
  </g>

  <!-- Shoulders / torso -->
  <ellipse cx="100" cy="185" rx="58" ry="35" fill="#1a2a45"/>
  <!-- Collar / shirt -->
  <path d="M72 175 Q100 165 128 175 L135 200 H65 Z" fill="#0d1e38"/>

  <!-- Neck -->
  <rect x="89" y="140" width="22" height="28" rx="8" fill="url(#skin-am)"/>

  <!-- Head -->
  <ellipse cx="100" cy="115" rx="38" ry="42" fill="url(#skin-am)"/>

  <!-- Hair -->
  <path d="M63 115 C62 88 72 68 100 65 C128 68 138 88 137 115 C134 98 128 80 100 76 C72 80 66 98 63 115 Z" fill="url(#hair-am)"/>
  <!-- Hair sides -->
  <ellipse cx="64" cy="112" rx="8" ry="14" fill="url(#hair-am)"/>
  <ellipse cx="136" cy="112" rx="8" ry="14" fill="url(#hair-am)"/>

  <!-- Eyes -->
  <ellipse cx="87"  cy="115" rx="5.5" ry="4" fill="#1a1008"/>
  <ellipse cx="113" cy="115" rx="5.5" ry="4" fill="#1a1008"/>
  <!-- Eye shine -->
  <circle cx="89"  cy="113.5" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="115" cy="113.5" r="1.5" fill="white" opacity="0.9"/>

  <!-- Eyebrows -->
  <path d="M81 108 Q87 105 93 107" stroke="#2c1a10" stroke-width="2" stroke-linecap="round"/>
  <path d="M107 107 Q113 105 119 108" stroke="#2c1a10" stroke-width="2" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M100 117 Q97 124 93 127 Q97 129 100 128 Q103 129 107 127 Q103 124 100 117Z" fill="#b07a55" opacity="0.7"/>

  <!-- Mouth — slight smile -->
  <path d="M91 136 Q100 141 109 136" stroke="#8a5535" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Circuit accent on temple -->
  <g filter="url(#glow-am)" opacity="0.8">
    <circle cx="61" cy="108" r="2.5" fill="#00e5ff"/>
    <line x1="61" y1="108" x2="55" y2="105" stroke="#00e5ff" stroke-width="1"/>
    <circle cx="55" cy="105" r="1.5" fill="#a855f7"/>
    <line x1="55" y1="105" x2="50" y2="109" stroke="#a855f7" stroke-width="1"/>
    <circle cx="50" cy="109" r="1.5" fill="#00e5ff"/>
  </g>

  <!-- Cyan rim glow -->
  <circle cx="100" cy="100" r="98" stroke="url(#accent-am)" stroke-width="1.5" opacity="0.5"/>
</svg>
